services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ApiKey__Key: abc123
      Ollama__Embedding__BaseUrl: http://host.docker.internal:11434
      Ollama__Embedding__Model: nomic-embed-text
      Ollama__Completion__BaseUrl: http://host.docker.internal:11434
      Ollama__Completion__Model: qwen2.5-coder:7b
      Qdrant__BaseUrl: http://qdrant:6333
      Qdrant__CollectionName: resume-chunks
      Completion__Provider: Ollama
      Corpus__Directory: /app/corpus
    volumes:
      - ./evidence:/app/corpus/evidence:ro
      - ./projects:/app/corpus/projects:ro
      - ./links:/app/corpus/links:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant

  frontend:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv/frontend:ro
    depends_on:
      - api

volumes:
  qdrant-data:
